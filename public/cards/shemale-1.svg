<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 530" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="s1-bg" cx="50%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#12081e"/>
      <stop offset="100%" stop-color="#080510"/>
    </radialGradient>
    <radialGradient id="s1-aura" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.38"/>
      <stop offset="70%" stop-color="#a855f7" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s1-pink" cx="50%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e879f9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s1-skin" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c8a8" stop-opacity="1"/>
      <stop offset="40%" stop-color="#e0a880" stop-opacity="0.95"/>
      <stop offset="85%" stop-color="#cca070" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#cca070" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s1-hair" cx="50%" cy="22%" r="65%">
      <stop offset="0%" stop-color="#18082a"/>
      <stop offset="50%" stop-color="#220c38"/>
      <stop offset="100%" stop-color="#10051e"/>
    </radialGradient>
    <radialGradient id="s1-hair-purple" cx="40%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#5b1f7a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#5b1f7a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s1-dress" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#7b1fa2" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7b1fa2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="s1-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="60%" stop-color="#080510" stop-opacity="0"/>
      <stop offset="100%" stop-color="#080510" stop-opacity="1"/>
    </linearGradient>
    <filter id="s1-blur-sm">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="530" fill="#080510"/>
  <rect width="400" height="530" fill="url(#s1-bg)"/>
  <rect width="400" height="530" fill="url(#s1-aura)"/>
  <rect width="400" height="530" fill="url(#s1-pink)"/>

  <!-- Floor glow -->
  <ellipse cx="200" cy="560" rx="270" ry="95" fill="#c084fc" opacity="0.08"/>

  <!-- Elegant body — long gown -->
  <ellipse cx="200" cy="450" rx="170" ry="240" fill="url(#s1-dress)"/>
  <ellipse cx="200" cy="480" rx="140" ry="220" fill="#12081e" opacity="0.55"/>
  <!-- Gown shimmer -->
  <ellipse cx="200" cy="440" rx="120" ry="200" fill="#c084fc" opacity="0.04"/>

  <!-- Bare shoulders — elegant neckline -->
  <ellipse cx="95" cy="325" rx="80" ry="32" fill="#f0c8a8" opacity="0.2"/>
  <ellipse cx="305" cy="325" rx="80" ry="32" fill="#f0c8a8" opacity="0.2"/>
  <!-- Collar bone -->
  <path d="M125,308 Q200,302 275,308" stroke="#f0c8a8" stroke-width="1.5" fill="none" opacity="0.18"/>

  <!-- Upper chest / décolleté -->
  <ellipse cx="200" cy="320" rx="85" ry="52" fill="#f0c8a8" opacity="0.16"/>
  <!-- Subtle V detail -->
  <polygon points="188,295 212,295 200,355" fill="#12081e" opacity="0.3"/>

  <!-- Neck — long and elegant -->
  <rect x="182" y="252" width="36" height="75" rx="18" fill="#f0c8a8" opacity="0.72"/>

  <!-- Choker necklace -->
  <rect x="178" y="258" width="44" height="7" rx="3.5" fill="#c9a96e" opacity="0.55"/>
  <circle cx="200" cy="262" r="4" fill="#c9a96e" opacity="0.7"/>
  <circle cx="200" cy="262" r="2" fill="#e8d090" opacity="0.6"/>

  <!-- Head / face — high cheekbones, defined -->
  <ellipse cx="200" cy="185" rx="76" ry="85" fill="url(#s1-skin)"/>
  <!-- Oval face shape -->
  <ellipse cx="200" cy="210" rx="68" ry="60" fill="#f0c8a8" opacity="0.38"/>

  <!-- Eyes — large, heavily made up -->
  <ellipse cx="172" cy="176" rx="15" ry="10" fill="#15081e" opacity="0.95"/>
  <ellipse cx="228" cy="176" rx="15" ry="10" fill="#15081e" opacity="0.95"/>
  <!-- Eyeshadow -->
  <ellipse cx="172" cy="172" rx="18" ry="9" fill="#7b1fa2" opacity="0.25" filter="url(#s1-blur-sm)"/>
  <ellipse cx="228" cy="172" rx="18" ry="9" fill="#7b1fa2" opacity="0.25" filter="url(s1-blur-sm)"/>
  <!-- Whites -->
  <ellipse cx="172" cy="176" rx="9.5" ry="6.5" fill="#f5e8e0" opacity="0.55"/>
  <ellipse cx="228" cy="176" rx="9.5" ry="6.5" fill="#f5e8e0" opacity="0.55"/>
  <!-- Deep violet irises -->
  <circle cx="172" cy="176" r="6" fill="#4a1860" opacity="0.9"/>
  <circle cx="228" cy="176" r="6" fill="#4a1860" opacity="0.9"/>
  <circle cx="169" cy="174" r="1.8" fill="white" opacity="0.75"/>
  <circle cx="225" cy="174" r="1.8" fill="white" opacity="0.75"/>
  <!-- Dramatic liner — winged -->
  <path d="M157,173 Q172,168 187,172" stroke="#15081e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M213,172 Q228,168 243,173" stroke="#15081e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Wing tips -->
  <path d="M187,172 L193,168" stroke="#15081e" stroke-width="2" stroke-linecap="round"/>
  <path d="M213,172 L207,168" stroke="#15081e" stroke-width="2" stroke-linecap="round"/>
  <!-- Lower lash line -->
  <path d="M159,180 Q172,183 185,180" stroke="#5b1f7a" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M215,180 Q228,183 241,180" stroke="#5b1f7a" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Brows — pencil thin, arched high -->
  <path d="M158,161 Q172,155 186,159" stroke="#2a0838" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M214,159 Q228,155 242,161" stroke="#2a0838" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Nose — petite, refined -->
  <ellipse cx="200" cy="203" rx="6" ry="4" fill="#cca070" opacity="0.28"/>
  <path d="M195,208 Q200,212 205,208" stroke="#cca070" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Lips — bold, full, dark rose -->
  <path d="M180,225 Q191,218 200,220 Q209,218 220,225 Q211,235 200,237 Q189,235 180,225Z" fill="#c0306a" opacity="0.92"/>
  <path d="M180,225 Q200,222 220,225" stroke="#a02050" stroke-width="0.8" fill="none" opacity="0.6"/>
  <!-- Lip gloss -->
  <ellipse cx="200" cy="226" rx="12" ry="3.5" fill="white" opacity="0.14"/>

  <!-- Blush -->
  <ellipse cx="148" cy="196" rx="25" ry="15" fill="#c084fc" opacity="0.1" filter="url(#s1-blur-sm)"/>
  <ellipse cx="252" cy="196" rx="25" ry="15" fill="#c084fc" opacity="0.1" filter="url(s1-blur-sm)"/>

  <!-- Long dark hair with purple sheen — very long -->
  <!-- Crown -->
  <ellipse cx="200" cy="120" rx="85" ry="88" fill="url(#s1-hair)"/>
  <!-- Long hair flowing over both shoulders -->
  <ellipse cx="115" cy="320" rx="80" ry="220" fill="#18082a" opacity="0.88" transform="rotate(-5 115 320)"/>
  <ellipse cx="285" cy="310" rx="70" ry="200" fill="#18082a" opacity="0.82" transform="rotate(5 285 310)"/>
  <!-- Hair on shoulders -->
  <ellipse cx="145" cy="200" rx="40" ry="90" fill="#220c38" opacity="0.8"/>
  <ellipse cx="255" cy="195" rx="35" ry="80" fill="#220c38" opacity="0.75"/>
  <!-- Purple shimmer -->
  <rect width="400" height="530" fill="url(#s1-hair-purple)"/>
  <!-- Hair shine streak -->
  <line x1="185" y1="90" x2="170" y2="200" stroke="#5b1f7a" stroke-width="2" opacity="0.3"/>

  <!-- Statement earrings -->
  <circle cx="128" cy="208" r="5.5" fill="#c9a96e" opacity="0.72"/>
  <rect x="126" y="213" width="4" height="20" rx="2" fill="#c9a96e" opacity="0.55"/>
  <circle cx="128" cy="234" r="5" fill="#c084fc" opacity="0.5"/>
  <circle cx="272" cy="208" r="5.5" fill="#c9a96e" opacity="0.72"/>
  <rect x="270" y="213" width="4" height="20" rx="2" fill="#c9a96e" opacity="0.55"/>
  <circle cx="272" cy="234" r="5" fill="#c084fc" opacity="0.5"/>

  <!-- Bottom fade -->
  <rect width="400" height="530" fill="url(#s1-fade)"/>
</svg>
